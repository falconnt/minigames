name: Deploy naar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # Supabase publishable key uit de repo-secret in de build injecteren.
      # De key hoort niet in de git-broncode; op de gepubliceerde site is hij
      # (noodzakelijkerwijs) wel zichtbaar — dat is prima voor een publishable key.
      - name: Injecteer Supabase publishable key
        run: |
          printf "export const RUNTIME_ANON_KEY = '%s';\n" "${SUPABASE_ANON_KEY}" > js/cloud-key.js
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      # Versie stempelen: uniek per deploy, zodat de cache ververst en de app
      # een zichtbaar versienummer heeft.
      - name: Stempel versie
        run: |
          BUILD="$(date -u +%Y.%m.%d)-r${GITHUB_RUN_NUMBER}-${GITHUB_SHA:0:7}"
          echo "export const APP_VERSION = '${BUILD}';" > js/version.js
          sed -i "s/minigames-__BUILD__/minigames-${BUILD}/" sw.js
          echo "Gestempelde versie: ${BUILD}"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
